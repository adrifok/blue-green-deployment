services:
    api:
      image: adrifok/todo-api:latest
      ports:
        - "3000:3000"
      environment:
        - MONGO_URI=mongodb://mongo:27017/todos
      depends_on:
        - mongo
      restart: unless-stopped

    mongo:
      image: mongo:7
      volumes:
        - mongo_data:/data/db
      restart: unless-stopped

volumes:
  mongo_data:
