name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/todo-api:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/blue-green-deployment
            git fetch origin && git reset --hard origin/main
            if grep -q "api-blue" nginx/nginx.conf; then TARGET=green; else TARGET=blue; fi
            docker-compose -f docker-compose.prod.yml up -d mongo nginx
            docker-compose -f docker-compose.prod.yml pull api-$TARGET
            docker-compose -f docker-compose.prod.yml up -d --no-deps api-$TARGET
            sleep 5
            bash switch.sh
